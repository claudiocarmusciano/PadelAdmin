spring.application.name=padeladmin

# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/padeladmin
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# "update" crea tablas que no existen y agrega columnas nuevas sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Servidor ───────────────────────────────────────────────────────────────────
server.port=8080

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.padeladmin=DEBUG
