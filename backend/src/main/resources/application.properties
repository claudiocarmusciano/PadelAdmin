spring.application.name=padeladmin

# ── Base de datos ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/padeladmin
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# "update" crea tablas que no existen y agrega columnas nuevas sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Servidor ───────────────────────────────────────────────────────────────────
server.port=8080

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.padeladmin=DEBUG

# ── Autenticación / JWT ────────────────────────────────────────────────────────
# El secret debe ser de al menos 32 bytes (256 bits). En producción usar variable de entorno.
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-must-be-32-bytes-min-padeladmin-2025}
app.jwt.ttl-hours=${JWT_TTL_HOURS:8}

# Admin inicial: si no existe ningún admin, se crea con estos credenciales al arrancar.
# En producción, sobreescribir con variables de entorno ADMIN_EMAIL y ADMIN_PASSWORD.
app.admin.email=${ADMIN_EMAIL:admin@padel.com}
app.admin.password=${ADMIN_PASSWORD:admin1234}
