spring.application.name=padeladmin

# ── Base de datos ──────────────────────────────────────────────────────────────
# En producción se sobreescriben con variables de entorno (Railway/Postgres).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/padeladmin}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# "update" crea tablas que no existen y agrega columnas nuevas sin borrar datos
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Servidor ───────────────────────────────────────────────────────────────────
# Railway inyecta PORT; en local usa 8080.
server.port=${PORT:8080}

# ── Logging ────────────────────────────────────────────────────────────────────
# Default INFO (producción). Para debug local: LOG_SQL_LEVEL=DEBUG LOG_APP_LEVEL=DEBUG
logging.level.org.hibernate.SQL=${LOG_SQL_LEVEL:INFO}
logging.level.com.padeladmin=${LOG_APP_LEVEL:INFO}

# ── Autenticación / JWT ────────────────────────────────────────────────────────
# El secret debe ser de al menos 32 bytes (256 bits). En producción usar variable de entorno.
app.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-must-be-32-bytes-min-padeladmin-2025}
app.jwt.ttl-hours=${JWT_TTL_HOURS:8}

# Admin inicial: si no existe ningún admin, se crea con estos credenciales al arrancar.
# En producción, sobreescribir con variables de entorno ADMIN_EMAIL y ADMIN_PASSWORD.
app.admin.email=${ADMIN_EMAIL:admin@padel.com}
app.admin.password=${ADMIN_PASSWORD:admin1234}

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
# Para enviar la contraseña inicial del club, reset, etc.
# MAIL_USERNAME = tu cuenta de Gmail; MAIL_PASSWORD = un "App Password" de Google
# (Cuenta Google → Seguridad → Verificación en 2 pasos → Contraseñas de aplicaciones).
# Si no están seteadas, el envío se desactiva y la contraseña se muestra en pantalla (fallback).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.mail.enabled=${MAIL_ENABLED:false}
